# Battery Storage Manager – ePaper Dashboard (Deep Sleep)
# For: Seeed Studio XIAO 7.5" ePaper Panel (800x480, ESP32-C3)
#
# Cycle: Wake → WiFi → fetch HA data → render display → deep sleep (30 min)
# Power: ~10mA during wake (~15s), ~10µA during sleep
# Battery life: ~6+ months with 2000mAh battery at 30min interval
#
# Setup:
#   1. Copy this file to your ESPHome config directory
#   2. Create/update secrets.yaml with wifi_ssid, wifi_password, api_key, ota_password
#   3. Adjust entity IDs below to match your Battery Storage Manager instance
#   4. Flash via ESPHome dashboard (first flash via USB, then OTA during wake window)

globals:
  - id: night_mode
    type: bool
    restore_value: no
    initial_value: "false"

esphome:
  name: battery-epaper
  friendly_name: "Batterie ePaper Display"
  on_boot:
    priority: -100  # Run after everything is initialized
    then:
      - wait_until:
          condition:
            api.connected:
          timeout: 30s
      # Wait for time sync from HA
      - wait_until:
          condition:
            time.has_time:
          timeout: 10s
      # Check if we're in night mode (01:00 - 06:00 local time)
      - lambda: |-
          auto now = id(ha_time).now();
          if (now.is_valid() && now.hour >= 1 && now.hour < 6) {
            id(night_mode) = true;
          } else {
            id(night_mode) = false;
          }
      - if:
          condition:
            lambda: "return id(night_mode);"
          then:
            # Night mode: show sleep screen, then sleep until 06:00
            - component.update: eink
            - delay: 10s
            - lambda: |-
                // Calculate minutes until 06:00
                auto now = id(ha_time).now();
                int mins_left = (6 - now.hour - 1) * 60 + (60 - now.minute);
                if (mins_left <= 0) mins_left = 1;
                id(deep_sleep_ctrl).set_sleep_duration(mins_left * 60 * 1000);
            - deep_sleep.enter: deep_sleep_ctrl
          else:
            # Day mode: fetch data, render, sleep 30 min
            - delay: 5s
            - component.update: eink
            - delay: 10s
            # Reset sleep duration to 30 min (in case it was changed by night mode)
            - lambda: "id(deep_sleep_ctrl).set_sleep_duration(30 * 60 * 1000);"
            - deep_sleep.enter: deep_sleep_ctrl

esp32:
  board: seeed_xiao_esp32c3
  variant: esp32c3
  framework:
    type: arduino

logger:
  level: WARN

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true    # Skip scanning, connect directly (saves ~3s)
  ap:
    ssid: "Battery-ePaper"
    password: "fallback123"

# No captive_portal – wastes power in deep sleep mode

# ── Deep Sleep ─────────────────────────────────────────────
deep_sleep:
  id: deep_sleep_ctrl
  run_duration: 60s       # Max awake time (safety fallback)
  sleep_duration: 30min   # Sleep between updates

time:
  - platform: homeassistant
    id: ha_time

# ── Fonts ──────────────────────────────────────────────────
font:
  - file: "gfonts://Inter@700"
    id: font_title
    size: 32

  - file: "gfonts://Inter@700"
    id: font_big
    size: 48

  - file: "gfonts://Inter@500"
    id: font_medium
    size: 22

  - file: "gfonts://Inter@400"
    id: font_small
    size: 16

  - file: "gfonts://Inter@400"
    id: font_tiny
    size: 12

# ── Home Assistant Sensors ─────────────────────────────────
# Adjust entity_id values to match your installation.
# No on_value triggers needed – we fetch once per wake cycle.

sensor:
  - platform: homeassistant
    id: battery_soc
    entity_id: sensor.battery_storage_manager_speicher_ladestand

  - platform: homeassistant
    id: current_price
    entity_id: sensor.battery_storage_manager_aktueller_strompreis

  - platform: homeassistant
    id: grid_power
    entity_id: sensor.battery_storage_manager_netzleistung

  - platform: homeassistant
    id: expected_solar
    entity_id: sensor.battery_storage_manager_erwartete_solarproduktion

  - platform: homeassistant
    id: inverter_power
    entity_id: sensor.battery_storage_manager_wechselrichter_leistung

  - platform: homeassistant
    id: consumption_forecast
    entity_id: sensor.battery_storage_manager_verbrauchsprognose

  # Average price today (from Tibber attribute)
  - platform: homeassistant
    id: avg_price
    entity_id: sensor.electricity_price_walchenseestrasse_8
    attribute: avg_price

text_sensor:
  - platform: homeassistant
    id: operating_mode
    entity_id: sensor.battery_storage_manager_betriebsmodus

  - platform: homeassistant
    id: strategy
    entity_id: sensor.battery_storage_manager_strategie

  - platform: homeassistant
    id: plan_summary
    entity_id: sensor.battery_storage_manager_speicherplan

  - platform: homeassistant
    id: planned_action
    entity_id: sensor.battery_storage_manager_geplante_aktion

  - platform: homeassistant
    id: next_cheap
    entity_id: sensor.battery_storage_manager_nachstes_gunstiges_fenster

  - platform: homeassistant
    id: next_expensive
    entity_id: sensor.battery_storage_manager_nachstes_teures_fenster

# ── SPI & Display ──────────────────────────────────────────
spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

display:
  - platform: waveshare_epaper
    id: eink
    cs_pin: GPIO3
    dc_pin: GPIO5
    reset_pin: GPIO2
    busy_pin:
      number: GPIO4
      inverted: true
    model: 7.50inV2
    auto_clear_enabled: false
    update_interval: never   # Only update via on_boot sequence
    lambda: |-
      const int W = 800;
      const int H = 480;
      const int P = 14;  // padding

      // ── Helper: parse HH:MM and "morgen" from ISO timestamp ──
      auto parse_time = [&](const std::string &ts, std::string &time_out, std::string &day_out) {
        time_out = "--:--";
        day_out = "";
        if (ts.length() >= 16) {
          time_out = ts.substr(11, 5);
          if (id(ha_time).now().is_valid()) {
            int ts_day = atoi(ts.substr(8, 2).c_str());
            if (ts_day != id(ha_time).now().day_of_month) day_out = "morgen";
            else day_out = "heute";
          }
        }
      };

      // ── Night Mode ──
      if (id(night_mode)) {
        it.print(W / 2, H / 2 - 80, id(font_medium), TextAlign::CENTER, "Strom-Dashboard @Familie Dietz");
        it.print(W / 2, H / 2 - 40, id(font_title), TextAlign::CENTER, "Schlafmodus");
        it.print(W / 2, H / 2, id(font_small), TextAlign::CENTER, "Naechste Aktualisierung um 06:00");
        if (!isnan(id(battery_soc).state)) {
          char buf[16];
          snprintf(buf, sizeof(buf), "Batterie: %.0f%%", id(battery_soc).state);
          it.print(W / 2, H / 2 + 40, id(font_medium), TextAlign::CENTER, buf);
        }
        return;
      }

      // ══════════════════════════════════════════════════════════
      // ── HEADER ──
      // ══════════════════════════════════════════════════════════
      it.print(P, P, id(font_title), "Strom-Dashboard @Familie Dietz");
      if (id(ha_time).now().is_valid()) {
        auto now = id(ha_time).now();
        char tbuf[6], dbuf[12];
        snprintf(tbuf, sizeof(tbuf), "%02d:%02d", now.hour, now.minute);
        snprintf(dbuf, sizeof(dbuf), "%02d.%02d.%04d", now.day_of_month, now.month, now.year);
        it.print(W - P, P + 2, id(font_medium), TextAlign::TOP_RIGHT, tbuf);
        it.print(W - P, P + 26, id(font_tiny), TextAlign::TOP_RIGHT, dbuf);
      }
      it.line(P, 50, W - P, 50);

      // ══════════════════════════════════════════════════════════
      // ── LEFT COLUMN: SOC (full height) ──
      // ══════════════════════════════════════════════════════════
      int col_left_w = 150;
      int soc_cx = col_left_w / 2;
      int soc_cy = 124;
      int soc_r = 52;
      float soc = isnan(id(battery_soc).state) ? 0 : id(battery_soc).state;

      // SOC ring
      for (int t = 0; t < 3; t++) {
        it.circle(soc_cx, soc_cy, soc_r - t);
        it.circle(soc_cx, soc_cy, soc_r - 8 + t);
      }
      // Fill arc
      float soc_angle = soc / 100.0 * 6.2832;
      for (float a = -1.5708; a < -1.5708 + soc_angle; a += 0.015) {
        for (int r = soc_r - 8; r <= soc_r; r++) {
          int px = soc_cx + r * cos(a);
          int py = soc_cy + r * sin(a);
          if (px >= 0 && px < W && py >= 0 && py < H)
            it.draw_pixel_at(px, py);
        }
      }

      // SOC value
      char soc_buf[8];
      snprintf(soc_buf, sizeof(soc_buf), "%.0f%%", soc);
      it.print(soc_cx, soc_cy - 10, id(font_big), TextAlign::CENTER, soc_buf);

      // Mode label
      std::string mode = "-";
      if (id(operating_mode).has_state()) {
        std::string m = id(operating_mode).state;
        if (m == "idle") mode = "Idle";
        else if (m == "charging") mode = "Netz-Laden";
        else if (m == "solar_charging") mode = "Solar-Laden";
        else if (m == "discharging") mode = "Entladen";
      }
      it.print(soc_cx, soc_cy + soc_r + 10, id(font_small), TextAlign::TOP_CENTER, mode.c_str());

      // Vertical separator
      it.line(col_left_w, 54, col_left_w, H - 30);

      // ══════════════════════════════════════════════════════════
      // ── RIGHT AREA ──
      // ══════════════════════════════════════════════════════════
      int rx = col_left_w + P;  // right area x start
      int rw = W - rx - P;      // right area width

      // ── Row 1: 3 metric cards ──
      int r1y = 58;
      int cw = rw / 3;
      int ch = 56;

      // Strompreis + Tagesdurchschnitt
      it.print(rx + 8, r1y + 4, id(font_tiny), "Strompreis");
      if (!isnan(id(current_price).state)) {
        char buf[24];
        if (!isnan(id(avg_price).state)) {
          snprintf(buf, sizeof(buf), "%.1f ct (Ø %.0f)",
                   id(current_price).state * 100, id(avg_price).state * 100);
        } else {
          snprintf(buf, sizeof(buf), "%.1f ct", id(current_price).state * 100);
        }
        it.print(rx + 8, r1y + 20, id(font_medium), buf);
      }
      it.line(rx + cw, r1y, rx + cw, r1y + ch);

      // Netzleistung
      it.print(rx + cw + 8, r1y + 4, id(font_tiny), "Netzleistung");
      if (!isnan(id(grid_power).state)) {
        char buf[16];
        float gp = id(grid_power).state;
        if (gp >= 0) snprintf(buf, sizeof(buf), "+%.0f W Bezug", gp);
        else snprintf(buf, sizeof(buf), "%.0f W Einsp.", gp);
        it.print(rx + cw + 8, r1y + 20, id(font_medium), buf);
      }
      it.line(rx + cw * 2, r1y, rx + cw * 2, r1y + ch);

      // Verbrauch
      it.print(rx + cw * 2 + 8, r1y + 4, id(font_tiny), "Verbrauchsprognose");
      if (!isnan(id(consumption_forecast).state)) {
        char buf[12];
        snprintf(buf, sizeof(buf), "%.0f W", id(consumption_forecast).state);
        it.print(rx + cw * 2 + 8, r1y + 20, id(font_medium), buf);
      }

      it.line(rx, r1y + ch, rx + rw, r1y + ch);

      // ── Row 2: Plan + Aktion ──
      int r2y = r1y + ch + 4;
      int r2h = 44;

      it.print(rx + 6, r2y + 2, id(font_tiny), "Speicherplan");
      if (id(plan_summary).has_state()) {
        it.print(rx + 6, r2y + 16, id(font_medium), id(plan_summary).state.c_str());
      }

      // Aktion (right-aligned)
      it.print(rx + rw - 6, r2y + 2, id(font_tiny), TextAlign::TOP_RIGHT, "Aktion");
      if (id(planned_action).has_state()) {
        it.print(rx + rw - 6, r2y + 16, id(font_medium), TextAlign::TOP_RIGHT,
                 id(planned_action).state.c_str());
      }

      it.line(rx, r2y + r2h, rx + rw, r2y + r2h);

      // ══════════════════════════════════════════════════════════
      // ── BOTTOM HALF: Two prominent time windows ──
      // ══════════════════════════════════════════════════════════
      int bot_y = r2y + r2h + 8;
      int box_w = rw / 2 - 6;
      int box_h = 110;

      // ── Günstigstes Zeitfenster (inverted) ──
      it.filled_rectangle(rx, bot_y, box_w, box_h);
      it.print(rx + 10, bot_y + 8, id(font_small), COLOR_OFF, "Guenstigstes Fenster");

      if (id(next_cheap).has_state() && id(next_cheap).state.length() > 10) {
        std::string cheap_time, cheap_day;
        parse_time(id(next_cheap).state, cheap_time, cheap_day);
        it.print(rx + 10, bot_y + 34, id(font_big), COLOR_OFF, cheap_time.c_str());
        it.print(rx + 10, bot_y + 84, id(font_small), COLOR_OFF, cheap_day.c_str());
      } else {
        it.print(rx + 10, bot_y + 34, id(font_big), COLOR_OFF, "--:--");
      }

      // ── Teuerstes Zeitfenster (outline, hatched) ──
      int exp_x = rx + box_w + 12;
      it.rectangle(exp_x, bot_y, box_w, box_h);
      it.rectangle(exp_x + 1, bot_y + 1, box_w - 2, box_h - 2);
      // Diagonal hatching for "danger" feel
      for (int i = 0; i < box_w + box_h; i += 8) {
        int x1 = exp_x + std::min(i, box_w);
        int y1 = bot_y + std::max(0, i - box_w);
        int x2 = exp_x + std::max(0, i - box_h);
        int y2 = bot_y + std::min(i, box_h);
        it.line(x1, y1, x2, y2);
      }
      // White box for text
      it.filled_rectangle(exp_x + 6, bot_y + 4, box_w - 12, box_h - 8, COLOR_OFF);

      it.print(exp_x + 12, bot_y + 8, id(font_small), "Teuerstes Fenster");

      if (id(next_expensive).has_state() && id(next_expensive).state.length() > 10) {
        std::string exp_time, exp_day;
        parse_time(id(next_expensive).state, exp_time, exp_day);
        it.print(exp_x + 12, bot_y + 34, id(font_big), exp_time.c_str());
        it.print(exp_x + 12, bot_y + 84, id(font_small), exp_day.c_str());
      } else {
        it.print(exp_x + 12, bot_y + 34, id(font_big), "--:--");
      }

      // ══════════════════════════════════════════════════════════
      // ── FOOTER ──
      // ══════════════════════════════════════════════════════════
      int foot_y = H - 24;
      it.line(P, foot_y, W - P, foot_y);

      // Strategy
      if (id(strategy).has_state()) {
        std::string s = id(strategy).state;
        if (s == "price_optimized") s = "Preisoptimiert";
        else if (s == "self_consumption") s = "Eigenverbrauch";
        else if (s == "manual") s = "Manuell";
        it.print(P, foot_y + 4, id(font_tiny), s.c_str());
      }

      // Inverter
      if (!isnan(id(inverter_power).state) && id(inverter_power).state > 0) {
        char inv[20];
        snprintf(inv, sizeof(inv), "WR: %.0f W", id(inverter_power).state);
        it.print(W / 2, foot_y + 4, id(font_tiny), TextAlign::TOP_CENTER, inv);
      }

      // Update hint
      it.print(W - P, foot_y + 4, id(font_tiny), TextAlign::TOP_RIGHT, "Aktualisierung alle 30 min");
