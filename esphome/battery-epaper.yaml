# Battery Storage Manager – ePaper Dashboard
# For: Seeed Studio XIAO 7.5" ePaper Panel (800x480, ESP32-C3)
#
# Shows: Battery SOC, current price, operating mode, solar forecast,
#        grid power, plan summary, and a 24h price/action timeline.
#
# Setup:
#   1. Copy this file to your ESPHome config directory
#   2. Create/update secrets.yaml with wifi_ssid, wifi_password, api_key, ota_password
#   3. Adjust entity IDs below to match your Battery Storage Manager instance
#   4. Flash via ESPHome dashboard

esphome:
  name: battery-epaper
  friendly_name: "Batterie ePaper Display"

esp32:
  board: seeed_xiao_esp32c3
  variant: esp32c3
  framework:
    type: arduino

logger:
  level: WARN

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Battery-ePaper"
    password: "fallback123"

captive_portal:

time:
  - platform: homeassistant
    id: ha_time

# ── Fonts ──────────────────────────────────────────────────
font:
  - file: "gfonts://Inter@700"
    id: font_title
    size: 32

  - file: "gfonts://Inter@700"
    id: font_big
    size: 48

  - file: "gfonts://Inter@500"
    id: font_medium
    size: 22

  - file: "gfonts://Inter@400"
    id: font_small
    size: 16

  - file: "gfonts://Inter@400"
    id: font_tiny
    size: 12

  - file: "gfonts://Material+Symbols+Outlined"
    id: icon_font
    size: 36
    glyphs:
      - "\U0000e1a3"  # battery_full
      - "\U0000e19c"  # battery_charging_full
      - "\U0000ebf7"  # solar_power
      - "\U0000e1a6"  # bolt (electricity)
      - "\U0000ef63"  # euro
      - "\U0000e8b5"  # timeline
      - "\U0000e425"  # trending_up
      - "\U0000e5d5"  # arrow_upward
      - "\U0000e5db"  # arrow_downward
      - "\U0000e002"  # home

# ── Home Assistant Sensors ─────────────────────────────────
# Adjust entity_id values to match your installation

sensor:
  - platform: homeassistant
    id: battery_soc
    entity_id: sensor.battery_storage_manager_speicher_ladestand
    on_value:
      then:
        - component.update: eink

  - platform: homeassistant
    id: current_price
    entity_id: sensor.battery_storage_manager_aktueller_strompreis

  - platform: homeassistant
    id: grid_power
    entity_id: sensor.battery_storage_manager_netzleistung

  - platform: homeassistant
    id: expected_solar
    entity_id: sensor.battery_storage_manager_erwartete_solarproduktion

  - platform: homeassistant
    id: inverter_power
    entity_id: sensor.battery_storage_manager_wechselrichter_leistung

  - platform: homeassistant
    id: consumption_forecast
    entity_id: sensor.battery_storage_manager_verbrauchsprognose

text_sensor:
  - platform: homeassistant
    id: operating_mode
    entity_id: sensor.battery_storage_manager_betriebsmodus
    on_value:
      then:
        - component.update: eink

  - platform: homeassistant
    id: strategy
    entity_id: sensor.battery_storage_manager_strategie

  - platform: homeassistant
    id: plan_summary
    entity_id: sensor.battery_storage_manager_speicherplan

  - platform: homeassistant
    id: planned_action
    entity_id: sensor.battery_storage_manager_geplante_aktion

  - platform: homeassistant
    id: next_cheap
    entity_id: sensor.battery_storage_manager_nachstes_gunstiges_fenster

  - platform: homeassistant
    id: next_expensive
    entity_id: sensor.battery_storage_manager_nachstes_teures_fenster

# ── SPI & Display ──────────────────────────────────────────
spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

display:
  - platform: waveshare_epaper
    id: eink
    cs_pin: GPIO3
    dc_pin: GPIO5
    reset_pin: GPIO2
    busy_pin:
      number: GPIO4
      inverted: true
    model: 7.50inV2
    auto_clear_enabled: false
    update_interval: 60s
    lambda: |-
      // ── Layout Constants ──
      const int W = 800;
      const int H = 480;
      const int PAD = 12;
      const int CARD_R = 8;

      // ── Helper: Draw Card Background ──
      auto draw_card = [&](int x, int y, int w, int h) {
        it.rectangle(x, y, w, h);
        it.rectangle(x+1, y+1, w-2, h-2);
      };

      // ── Header ──
      it.print(PAD, PAD, id(font_title), "Batteriespeicher");

      // Time
      if (id(ha_time).now().is_valid()) {
        char time_buf[6];
        auto now = id(ha_time).now();
        snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
        it.print(W - PAD, PAD + 4, id(font_medium), TextAlign::TOP_RIGHT, time_buf);

        char date_buf[12];
        snprintf(date_buf, sizeof(date_buf), "%02d.%02d.%04d", now.day_of_month, now.month, now.year);
        it.print(W - PAD, PAD + 28, id(font_tiny), TextAlign::TOP_RIGHT, date_buf);
      }

      it.line(PAD, 52, W - PAD, 52);

      // ── Row 1: SOC Ring + Status Cards ──
      int row1_y = 62;

      // SOC Circle (large, left side)
      int soc_cx = 80;
      int soc_cy = row1_y + 70;
      int soc_r = 55;
      float soc = 0;
      if (!isnan(id(battery_soc).state)) soc = id(battery_soc).state;

      // Draw SOC arc (simplified as filled/empty segments)
      it.circle(soc_cx, soc_cy, soc_r);
      it.circle(soc_cx, soc_cy, soc_r - 1);
      it.circle(soc_cx, soc_cy, soc_r - 8);
      it.circle(soc_cx, soc_cy, soc_r - 9);

      // Fill arc proportional to SOC
      float soc_angle = soc / 100.0 * 3.14159 * 2;
      for (float a = -1.5708; a < -1.5708 + soc_angle; a += 0.02) {
        for (int r = soc_r - 8; r <= soc_r; r++) {
          int px = soc_cx + r * cos(a);
          int py = soc_cy + r * sin(a);
          if (px >= 0 && px < W && py >= 0 && py < H)
            it.draw_pixel_at(px, py);
        }
      }

      // SOC text
      char soc_buf[8];
      snprintf(soc_buf, sizeof(soc_buf), "%.0f%%", soc);
      it.print(soc_cx, soc_cy - 8, id(font_big), TextAlign::CENTER, soc_buf);

      // Mode under SOC circle
      std::string mode_text = "—";
      if (id(operating_mode).has_state()) {
        std::string m = id(operating_mode).state;
        if (m == "idle") mode_text = "Idle";
        else if (m == "charging") mode_text = "Netz";
        else if (m == "solar_charging") mode_text = "Solar";
        else if (m == "discharging") mode_text = "Entladen";
      }
      it.print(soc_cx, soc_cy + soc_r + 8, id(font_small), TextAlign::TOP_CENTER, mode_text.c_str());

      // ── Status Cards (right of SOC) ──
      int card_x = 170;
      int card_w = (W - card_x - PAD * 2) / 3;
      int card_h = 60;

      // Card 1: Strompreis
      draw_card(card_x, row1_y, card_w - 4, card_h);
      it.print(card_x + 8, row1_y + 6, id(font_tiny), "Strompreis");
      if (!isnan(id(current_price).state)) {
        char price_buf[16];
        snprintf(price_buf, sizeof(price_buf), "%.1f ct", id(current_price).state * 100);
        it.print(card_x + 8, row1_y + 22, id(font_medium), price_buf);
      } else {
        it.print(card_x + 8, row1_y + 22, id(font_medium), "-- ct");
      }

      // Card 2: Netzleistung
      int c2_x = card_x + card_w;
      draw_card(c2_x, row1_y, card_w - 4, card_h);
      it.print(c2_x + 8, row1_y + 6, id(font_tiny), "Netz");
      if (!isnan(id(grid_power).state)) {
        char grid_buf[16];
        float gp = id(grid_power).state;
        if (gp >= 0) {
          snprintf(grid_buf, sizeof(grid_buf), "+%.0f W", gp);
        } else {
          snprintf(grid_buf, sizeof(grid_buf), "%.0f W", gp);
        }
        it.print(c2_x + 8, row1_y + 22, id(font_medium), grid_buf);
      } else {
        it.print(c2_x + 8, row1_y + 22, id(font_medium), "-- W");
      }

      // Card 3: Solar
      int c3_x = card_x + card_w * 2;
      draw_card(c3_x, row1_y, card_w - 4, card_h);
      it.print(c3_x + 8, row1_y + 6, id(font_tiny), "Solar heute");
      if (!isnan(id(expected_solar).state)) {
        char solar_buf[16];
        snprintf(solar_buf, sizeof(solar_buf), "%.1f kWh", id(expected_solar).state);
        it.print(c3_x + 8, row1_y + 22, id(font_medium), solar_buf);
      } else {
        it.print(c3_x + 8, row1_y + 22, id(font_medium), "-- kWh");
      }

      // ── Row 2: Plan Summary + Action + Forecast ──
      int row2_y = row1_y + card_h + 12;

      // Plan summary (full width)
      draw_card(card_x, row2_y, W - card_x - PAD, card_h);
      it.print(card_x + 8, row2_y + 6, id(font_tiny), "Speicherplan");
      if (id(plan_summary).has_state()) {
        it.print(card_x + 8, row2_y + 22, id(font_medium), id(plan_summary).state.c_str());
      }

      // ── Row 3: Current Action + Verbrauch + Next Windows ──
      int row3_y = row2_y + card_h + 8;
      int row3_card_w = (W - card_x - PAD * 2) / 3;

      // Current action
      draw_card(card_x, row3_y, row3_card_w - 4, card_h);
      it.print(card_x + 8, row3_y + 6, id(font_tiny), "Aktion");
      if (id(planned_action).has_state()) {
        it.print(card_x + 8, row3_y + 22, id(font_medium), id(planned_action).state.c_str());
      }

      // Consumption forecast
      int r3c2_x = card_x + row3_card_w;
      draw_card(r3c2_x, row3_y, row3_card_w - 4, card_h);
      it.print(r3c2_x + 8, row3_y + 6, id(font_tiny), "Verbrauch");
      if (!isnan(id(consumption_forecast).state)) {
        char cons_buf[16];
        snprintf(cons_buf, sizeof(cons_buf), "%.0f W", id(consumption_forecast).state);
        it.print(r3c2_x + 8, row3_y + 22, id(font_medium), cons_buf);
      }

      // Inverter power
      int r3c3_x = card_x + row3_card_w * 2;
      draw_card(r3c3_x, row3_y, row3_card_w - 4, card_h);
      it.print(r3c3_x + 8, row3_y + 6, id(font_tiny), "Wechselrichter");
      if (!isnan(id(inverter_power).state)) {
        char inv_buf[16];
        snprintf(inv_buf, sizeof(inv_buf), "%.0f W", id(inverter_power).state);
        it.print(r3c3_x + 8, row3_y + 22, id(font_medium), inv_buf);
      } else {
        it.print(r3c3_x + 8, row3_y + 22, id(font_medium), "0 W");
      }

      // ── Divider ──
      int chart_top = row3_y + card_h + 16;
      it.line(PAD, chart_top - 4, W - PAD, chart_top - 4);

      // ── Price Timeline Chart (bottom half) ──
      // This section draws a simplified 24h price bar chart
      // The actual plan data with actions would require JSON parsing
      // which is complex in ESPHome lambda. Instead we show a
      // visual indicator based on next cheap/expensive windows.

      int chart_x = PAD + 30;
      int chart_w = W - chart_x - PAD;
      int chart_h = H - chart_top - 40;
      int chart_bottom = chart_top + chart_h;

      it.print(PAD, chart_top, id(font_small), "24h Preisverlauf");

      // Chart frame
      it.line(chart_x, chart_top + 24, chart_x, chart_bottom);
      it.line(chart_x, chart_bottom, chart_x + chart_w, chart_bottom);

      // Time labels (every 3 hours)
      if (id(ha_time).now().is_valid()) {
        int current_hour = id(ha_time).now().hour;
        for (int h = 0; h < 24; h += 3) {
          int display_hour = (current_hour + h) % 24;
          float x_pos = chart_x + (float)h / 24.0 * chart_w;
          char hlbl[4];
          snprintf(hlbl, sizeof(hlbl), "%02d", display_hour);
          it.print((int)x_pos, chart_bottom + 4, id(font_tiny), TextAlign::TOP_CENTER, hlbl);

          // Tick mark
          it.line((int)x_pos, chart_bottom, (int)x_pos, chart_bottom + 3);
        }

        // "Now" marker
        it.filled_rectangle(chart_x, chart_top + 24, 3, chart_h - 24);
        it.print(chart_x + 6, chart_top + 24, id(font_tiny), "Jetzt");
      }

      // Price range labels
      if (!isnan(id(current_price).state)) {
        char cur_price[12];
        snprintf(cur_price, sizeof(cur_price), "%.0f ct", id(current_price).state * 100);
        it.print(PAD, chart_top + chart_h / 2, id(font_tiny), TextAlign::CENTER_LEFT, cur_price);
      }

      // Next cheap window indicator
      if (id(next_cheap).has_state() && id(next_cheap).state.length() > 10) {
        // Parse hour from ISO timestamp
        std::string ts = id(next_cheap).state;
        int cheap_hour = 0;
        if (ts.length() >= 13) {
          cheap_hour = atoi(ts.substr(11, 2).c_str());
        }
        int current_h = id(ha_time).now().is_valid() ? id(ha_time).now().hour : 0;
        int hours_until = (cheap_hour - current_h + 24) % 24;
        float x_cheap = chart_x + (float)hours_until / 24.0 * chart_w;

        // Draw green zone indicator
        int zone_w = chart_w / 12;  // ~2h wide
        int zone_y = chart_top + 28;
        int zone_h = chart_h - 32;
        for (int i = 0; i < zone_w; i += 3) {
          it.line((int)x_cheap + i, zone_y, (int)x_cheap + i, zone_y + zone_h);
        }
        it.print((int)x_cheap + zone_w / 2, zone_y - 2, id(font_tiny), TextAlign::BOTTOM_CENTER, "guenstig");
      }

      // Next expensive window indicator
      if (id(next_expensive).has_state() && id(next_expensive).state.length() > 10) {
        std::string ts = id(next_expensive).state;
        int exp_hour = 0;
        if (ts.length() >= 13) {
          exp_hour = atoi(ts.substr(11, 2).c_str());
        }
        int current_h = id(ha_time).now().is_valid() ? id(ha_time).now().hour : 0;
        int hours_until = (exp_hour - current_h + 24) % 24;
        float x_exp = chart_x + (float)hours_until / 24.0 * chart_w;

        // Draw striped zone indicator (expensive)
        int zone_w = chart_w / 12;
        int zone_y = chart_top + 28;
        int zone_h = chart_h - 32;
        for (int y = zone_y; y < zone_y + zone_h; y += 4) {
          it.line((int)x_exp, y, (int)x_exp + zone_w, y);
        }
        it.print((int)x_exp + zone_w / 2, zone_y - 2, id(font_tiny), TextAlign::BOTTOM_CENTER, "teuer");
      }

      // Strategy badge (bottom right)
      if (id(strategy).has_state()) {
        std::string strat = id(strategy).state;
        std::string strat_label = strat;
        if (strat == "price_optimized") strat_label = "Preisoptimiert";
        else if (strat == "self_consumption") strat_label = "Eigenverbrauch";
        else if (strat == "manual") strat_label = "Manuell";
        it.print(W - PAD, H - PAD, id(font_tiny), TextAlign::BOTTOM_RIGHT, strat_label.c_str());
      }
