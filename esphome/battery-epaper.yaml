# Battery Storage Manager – ePaper Display (Original)
# Board: Seeed XIAO ESP32-C3

substitutions:
  device_name: battery-epaper
  friendly_name: "Batterie ePaper Display"

packages:
  board: !include boards/xiao_c3.yaml
  dashboard: !include dashboard-common.yaml

logger:
  level: WARN

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

safe_mode:
  disabled: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "Battery-ePaper"
    password: "fallback123"
